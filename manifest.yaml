# Repo-to-Hermes plugin contract.
#
# Each exposed tool is named here and mapped to a reviewed script entrypoint.
# Keep argv fixed and explicit so Hermes never composes shell commands.
#
# Schema:
# tools:
#   - name: snake_case_tool_name
#     path: shell/example.sh | python -m ops_scripts.example
#     tier: t1 | t3
#     language: sh | py
#     argv: []
#     description: short operator-facing summary
#
tools:
  - name: backup_check
    path: shell/backup-check.sh
    tier: t1
    language: sh
    argv: []
    description: last restic→B2 snapshot time, age in hours, and repo health
